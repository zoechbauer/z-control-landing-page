<ion-footer>
  <ion-toolbar>
    <div
      class="footer-content"
      role="button"
      tabindex="0"
      (click)="toggleFooterDetails()"
      (keydown.enter)="toggleFooterDetails()"
    >
      <!-- Compact footer  -->
      <div class="footer-compact">
        <div
          class="logo-container"
          title="z-control — Innovative Open Source Mobile Solutions & Tools — Always Free"
        >
          <div class="footer-copyright">© 2025</div>
          <div>
            <img
              class="logo"
              src="assets/icon/z-bell-48px.png"
              alt="z-control logo"
            />
          </div>
          <div class="z-control-name">z-control</div>
        </div>

        <ion-button
          fill="clear"
          size="small"
          class="expand-button"
          (keydown.enter)="toggleFooterDetails()"
          title="{{ showDetails ? 'Collapse details' : 'Expand details' }}"
        >
          <ion-icon
            [name]="showDetails ? 'chevron-up-outline' : 'chevron-down-outline'"
            slot="icon-only"
          ></ion-icon>
        </ion-button>
      </div>

      <!-- Expandable details -->
      <div class="footer-details" [class.expanded]="showDetails">
        <div
          class="footer-section"
          [class.not-enabled]="!(fa.enabled$ | async)"
        >
          <p>Innovative Open Source Solutions & Tools<br />Always Free</p>
          <div class="enable-analytics section-margin-top">
            <ion-toggle
              [checked]="fa.enabled$ | async"
              (ionChange)="onChangeEnableAnalytics($event.detail.checked)"
              title="Enable or disable anonymous analytics"
            >
              Enable Analytics
            </ion-toggle>
          </div>
          <div class="section-margin-top">
            <ion-icon name="document-text-outline"></ion-icon>
            <a
              class="footer-link"
              [routerLink]="privacyPolicyLink"
              [queryParams]="{ internal: 'true' }"
              title="Read our privacy policy"
            >
              Privacy Policy
            </a>
          </div>

          <div
            class="section-margin-top check-analytics-enabled version-and-changelog"
            (click)="$event.stopPropagation(); onOpenChangelog()"
            (keydown.enter)="$event.stopPropagation(); onOpenChangelog()"
            title="{{
              isAnalyticsEnabled
                ? 'Open release notes (changelog) — grouped by category and sorted newest first'
                : ''
            }}"
          >
            <div>{{ versionInfo }}</div>
            <ion-button
              class="check-analytics-button change-log-button"
              data-test="changelog"
              (click)="$event.stopPropagation(); onOpenChangelog()"
              (keydown.enter)="$event.stopPropagation(); onOpenChangelog()"
              fill="clear"
              size="small"
            >
              <ion-icon name="list-outline" slot="start"></ion-icon>
              Release Notes
            </ion-button>
          </div>

          <div class="section-margin-top check-analytics-enabled">
            <ion-button
              class="github-dashboard-button check-analytics-button"
              data-test="github-analytics"
              (click)="$event.stopPropagation(); onOpenGitHubAnalytics()"
              (keydown.enter)="
                $event.stopPropagation(); onOpenGitHubAnalytics()
              "
              title="{{
                isAnalyticsEnabled
                  ? 'Open z-control GitHub analytics Dashboard'
                  : ''
              }}"
              fill="clear"
              size="small"
            >
              <ion-icon name="logo-github" slot="start"></ion-icon>
              z-control<br />
              GitHub Analytics Dashboard
            </ion-button>
          </div>
          <div class="section-margin-top check-analytics-enabled">
            <ion-button
              class="check-analytics-button get-source-code-button"
              data-test="source-code"
              (click)="$event.stopPropagation(); onGetSourceCode()"
              (keydown.enter)="$event.stopPropagation(); onGetSourceCode()"
              title="{{
                isAnalyticsEnabled
                  ? 'Open z-control Landing Page GitHub repository in a new tab'
                  : ''
              }}"
              fill="clear"
              size="small"
            >
              <ion-icon name="logo-github" slot="start"></ion-icon>
              Get Source Code
            </ion-button>
          </div>
        </div>
        <div class="footer-contact section-margin-top">
          <div class="footer-email" title="Contact support via email">
            <ion-icon name="mail-outline"></ion-icon>
            <a class="footer-link" href="{{ mailtoLink }}"
              >z-control Support & Feedback</a
            >
          </div>
          <div class="contact-item" title="Programmer and owner of z-control">
            <ion-icon name="person-outline"></ion-icon>
            <span>Hans Zöchbauer</span>
          </div>
          <div class="contact-item" title="Location of z-control">
            <ion-icon name="location-outline"></ion-icon>
            <span>Austria</span>
          </div>
        </div>
      </div>
    </div>
  </ion-toolbar>
</ion-footer>
